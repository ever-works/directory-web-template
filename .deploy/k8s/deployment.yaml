apiVersion: apps/v1
kind: Deployment
metadata:
    name: web
    namespace: ever-works
    labels:
        app.kubernetes.io/name: web
        app.kubernetes.io/managed-by: kubectl
spec:
    replicas: 1
    selector:
        matchLabels:
            app.kubernetes.io/name: web
    strategy:
        type: RollingUpdate
        rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
    template:
        metadata:
            labels:
                app.kubernetes.io/name: web
        spec:
            # Uncomment + populate when pulling from a private registry.
            # See README.md "Pulling private images".
            # imagePullSecrets:
            #     - name: regcred
            containers:
                - name: app
                  # Replace with the image you built + pushed. Example:
                  #   ghcr.io/your-user/my-site:v1
                  image: IMAGE_PLACEHOLDER
                  imagePullPolicy: IfNotPresent
                  ports:
                      - containerPort: 3000
                        name: http
                  readinessProbe:
                      httpGet:
                          path: /
                          port: http
                      periodSeconds: 5
                      initialDelaySeconds: 5
                  livenessProbe:
                      httpGet:
                          path: /
                          port: http
                      periodSeconds: 10
                      initialDelaySeconds: 30
                  resources:
                      requests:
                          cpu: 100m
                          memory: 256Mi
                      limits:
                          cpu: 500m
                          memory: 1Gi
                  env:
                      - name: NODE_ENV
                        value: production
                      - name: PORT
                        value: "3000"
                      - name: HOSTNAME
                        value: 0.0.0.0
                      # Add your own env vars / Secret refs here.
                      # - name: DATABASE_URL
                      #   valueFrom:
                      #       secretKeyRef:
                      #           name: web-secrets
                      #           key: DATABASE_URL
