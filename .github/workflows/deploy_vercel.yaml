name: Vercel Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Vercel environment to deploy to (e.g., production, staging, preview)"
        required: true
        type: string
  workflow_call:
    inputs:
      environment:
        required: true
        type: string

permissions:
  contents: read
  deployments: write

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  DATA_REPOSITORY: "https://github.com/${{ github.repository_owner }}/${{ secrets.DATA_REPOSITORY }}"
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Target environment
        run: echo "Deploying to ${{ inputs.environment }}"

      - uses: actions/checkout@v4

      - name: Detect package manager
        id: detect-pm
        run: |
          if [ -f "pnpm-lock.yaml" ]; then
            echo "manager=pnpm"                    >> $GITHUB_OUTPUT
            echo "global-cmd=pnpm add --global"    >> $GITHUB_OUTPUT
          elif [ -f "yarn.lock" ]; then
            echo "manager=yarn"                    >> $GITHUB_OUTPUT
            echo "global-cmd=yarn global add"      >> $GITHUB_OUTPUT
          else
            echo "manager=npm"                     >> $GITHUB_OUTPUT
            echo "global-cmd=npm install --global" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm
        if: steps.detect-pm.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Vercel CLI
        run: ${{ steps.detect-pm.outputs.global-cmd }} vercel@latest

      - name: Link Vercel project
        run: |
          SCOPE_FLAG=""
          [ -n "${{ secrets.VERCEL_TEAM_SCOPE }}" ] && SCOPE_FLAG="--scope ${{ secrets.VERCEL_TEAM_SCOPE }}"
          vercel link --yes $SCOPE_FLAG --project ${{ github.event.repository.name }} --token=$VERCEL_TOKEN

      - name: Set DATA_REPOSITORY env variable
        continue-on-error: true
        run: |
          SCOPE_FLAG=""
          [ -n "${{ secrets.VERCEL_TEAM_SCOPE }}" ] && SCOPE_FLAG="--scope ${{ secrets.VERCEL_TEAM_SCOPE }}"
          echo -n "$DATA_REPOSITORY" | vercel env add DATA_REPOSITORY ${{ inputs.environment }} $SCOPE_FLAG --token $VERCEL_TOKEN

      - name: Set GH_TOKEN env variable
        continue-on-error: true
        run: |
          SCOPE_FLAG=""
          [ -n "${{ secrets.VERCEL_TEAM_SCOPE }}" ] && SCOPE_FLAG="--scope ${{ secrets.VERCEL_TEAM_SCOPE }}"
          echo -n "${{ secrets.GH_TOKEN }}" | vercel env add GH_TOKEN ${{ inputs.environment }} $SCOPE_FLAG --token $VERCEL_TOKEN

      - name: Set CRON_SECRET env variable
        if: ${{ secrets.CRON_SECRET != '' }}
        continue-on-error: true
        run: |
          SCOPE_FLAG=""
          [ -n "${{ secrets.VERCEL_TEAM_SCOPE }}" ] && SCOPE_FLAG="--scope ${{ secrets.VERCEL_TEAM_SCOPE }}"
          echo -n "${{ secrets.CRON_SECRET }}" | vercel env add CRON_SECRET ${{ inputs.environment }} $SCOPE_FLAG --token $VERCEL_TOKEN

      - name: Pull Vercel settings
        run: |
          SCOPE_FLAG=""
          [ -n "${{ secrets.VERCEL_TEAM_SCOPE }}" ] && SCOPE_FLAG="--scope ${{ secrets.VERCEL_TEAM_SCOPE }}"
          vercel pull --yes $SCOPE_FLAG --environment=${{ inputs.environment }} --token=$VERCEL_TOKEN

      - name: Trigger deployment via API
        id: trigger_deployment
        continue-on-error: true
        run: |
          API_URL="https://api.vercel.com/v13/deployments"
          [ -n "${{ secrets.VERCEL_TEAM_SCOPE }}" ] && API_URL="${API_URL}?slug=${{ secrets.VERCEL_TEAM_SCOPE }}"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$API_URL" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "${{ github.event.repository.name }}",
              "gitSource": {
                "type": "github",
                "ref": "${{ github.ref_name }}",
                "repoId": "${{ github.repository_id }}",
                "sha": "${{ github.sha }}"
              },
              "target": "${{ inputs.environment }}"
            }')

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            DEPLOYMENT_URL=$(echo "$BODY" | jq -r '.url // empty')
            DEPLOYMENT_ID=$(echo "$BODY"  | jq -r '.id  // empty')
            [ -n "$DEPLOYMENT_URL" ] && echo "🚀 Deployment URL: https://$DEPLOYMENT_URL"
            [ -n "$DEPLOYMENT_ID"  ] && echo "📋 Deployment ID:  $DEPLOYMENT_ID"
            echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          else
            echo "❌ API deployment failed (HTTP $HTTP_CODE) — falling back to CLI"
            echo "Error: $(echo "$BODY" | jq -r '.error.message // "Unknown error"')"
            exit 1
          fi

      - name: Build project artifacts (CLI fallback)
        if: steps.trigger_deployment.outcome == 'failure'
        run: |
          SCOPE_FLAG=""
          [ -n "${{ secrets.VERCEL_TEAM_SCOPE }}" ] && SCOPE_FLAG="--scope ${{ secrets.VERCEL_TEAM_SCOPE }}"
          PROD_FLAG=""
          [ "${{ inputs.environment }}" = "production" ] && PROD_FLAG="--prod"
          vercel build $SCOPE_FLAG $PROD_FLAG --token=$VERCEL_TOKEN

      - name: Deploy project artifacts (CLI fallback)
        if: steps.trigger_deployment.outcome == 'failure'
        run: |
          SCOPE_FLAG=""
          [ -n "${{ secrets.VERCEL_TEAM_SCOPE }}" ] && SCOPE_FLAG="--scope ${{ secrets.VERCEL_TEAM_SCOPE }}"
          PROD_FLAG=""
          [ "${{ inputs.environment }}" = "production" ] && PROD_FLAG="--prod"
          vercel deploy --prebuilt $SCOPE_FLAG $PROD_FLAG --token=$VERCEL_TOKEN

      - name: Update cron schedule
        if: success() && steps.trigger_deployment.outputs.deployment_id != ''
        env:
          VERCEL_PROJECT_ID: ${{ github.event.repository.name }}
          VERCEL_DEPLOYMENT_ID: ${{ steps.trigger_deployment.outputs.deployment_id }}
          VERCEL_PLAN: ${{ secrets.VERCEL_PLAN }}
        run: npx tsx scripts/update-cron.ts

      - name: Deployment summary
        if: success()
        run: echo "✅ Deployment to ${{ inputs.environment }} completed successfully"
